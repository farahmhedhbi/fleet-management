# =========================
#  SERVER / APP
# =========================

# Port HTTP de l'API Spring Boot (http://localhost:8080)
server.port=8080

# Nom logique de l'application (log, monitoring, etc.)
spring.application.name=fleet_backend


# =========================
#  DATABASE (PostgreSQL)
# =========================

# URL JDBC vers ta base "fleet_db"
spring.datasource.url=jdbc:postgresql://localhost:5432/fleet_db 

# Identifiants PostgreSQL
spring.datasource.username=postgres
spring.datasource.password=farah

# Driver JDBC PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver


# =========================
#  JPA / HIBERNATE
# =========================

# Stratégie de génération du schéma:
# - update: met ŕ jour les tables sans supprimer les données (bon pour dev)
# - create-drop: recrée et supprime ŕ chaque run (perd les données)
# - validate: vérifie seulement (souvent prod)
spring.jpa.hibernate.ddl-auto=update

# Afficher les requętes SQL dans la console (utile dev)
spring.jpa.show-sql=true

# Dialecte Hibernate pour PostgreSQL (aide Hibernate ŕ générer SQL correct)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Formater SQL dans les logs (plus lisible)
spring.jpa.properties.hibernate.format_sql=true

# Évite le warning + évite des accčs DB "magiques" pendant la sérialisation JSON
# (meilleure pratique pour API REST)
spring.jpa.open-in-view=false


# =========================
#  JWT (AUTH)
# =========================

# Clé secrčte utilisée pour signer les tokens JWT (doit rester privée)
# ? En prod: mets-la dans une variable d'environnement, pas en dur.
jwt.secret=mySecretKeyForFleetManagementSystem2024VeryLongAndSecureKeyForHS256Algorithm

# Durée de validité du token en millisecondes
# 86400000 ms = 24 heures
jwt.expiration=86400000


# =========================
#  CORS (FRONTEND)
# =========================

# Autorise les requętes venant de ton frontend Next.js
cors.allowed-origins=http://localhost:3000


# =========================
#  LOGGING (DEBUG)
# =========================

# Logs de ton package (debug utile pour dev)
logging.level.com.example.fleet_backend=DEBUG

# Logs de Spring Security (utile pour comprendre 401/403, filtres, etc.)
logging.level.org.springframework.security=DEBUG

# Logs des requętes web (utile pour debug endpoints)
logging.level.org.springframework.web=DEBUG


